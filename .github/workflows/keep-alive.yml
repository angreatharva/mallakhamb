name: Keep Server Alive

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/1 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Server
        run: |
          echo "Pinging server at $(date)"
          curl -f https://mallakhamb-server.onrender.com/api/health || echo "Ping failed"
          echo "Ping completed"
