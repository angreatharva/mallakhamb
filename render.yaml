services:
  # Backend API Service
  - type: web
    name: mallakhamb-api
    env: node
    region: oregon
    plan: free
    rootDir: Server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NGROK_ENABLED
        value: false
      # Add these in Render Dashboard (sensitive):
      # - MONGODB_URI
      # - JWT_SECRET
      # - EMAIL_USER
      # - EMAIL_PASS
      # - CLIENT_URL (your frontend URL when deployed)
      # - FRONTEND_URL (your frontend URL when deployed)
      # - PRODUCTION_URL (your backend URL)
    healthCheckPath: /api/health
