services:
  # Backend API Service
  - type: web
    name: mallakhamb-server
    env: node
    region: oregon
    plan: free
    rootDir: Server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NGROK_ENABLED
        value: false
      # Database - Add in Render Dashboard (sensitive)
      - key: MONGODB_URI
        sync: false
      # JWT Secret - Add in Render Dashboard (sensitive, min 32 chars)
      - key: JWT_SECRET
        sync: false
      # Email Configuration - Add in Render Dashboard (sensitive)
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      # Frontend URL - Update after deploying frontend
      - key: CLIENT_URL
        value: https://mallakhamb-web.onrender.com
      - key: FRONTEND_URL
        value: https://mallakhamb-web.onrender.com
      # Backend URL - Update with your actual backend URL
      - key: PRODUCTION_URL
        value: https://mallakhamb-server.onrender.com

  # Frontend Static Site
  - type: web
    name: mallakhamb-web
    env: static
    rootDir: Web
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_STORAGE_KEY
        sync: false
      # Set VITE_API_URL in Render Dashboard to your backend URL
      # Example: https://mallakhamb-server.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: geolocation=(), microphone=(), camera=()
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
